name: دانلودر یوتیوب

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      output_format:
        description: 'Output type'
        required: true
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio only)
        default: 'mp4 (video)'
      desired_quality:
        description: 'Quality (video: 144p|360p|480p|720p|1080p  |  audio: 64kbps|128kbps|192kbps|320kbps)'
        required: false
        type: string
        default: '720p'
      youtube_cookies:
        description: |
          (اختیاری) محتوای فایل cookies.txt از مرورگر شما
          راهنما: https://github.com/yt-dlp/yt-dlp/wiki/Extractors#exporting-youtube-cookies
        required: false
        type: string
        default: ''
      max_part_mb:
        description: 'Max split size in MB (0 = auto 95MB)'
        required: false
        type: string
        default: '95'
      output_folder:
        description: 'Destination folder inside the repo'
        required: false
        type: string
        default: 'downloads'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip curl python3 python3-pip ffmpeg
          # Always use latest yt-dlp (bot detection fixes ship frequently)
          pip3 install --quiet --upgrade yt-dlp

      # ── Write cookies file if provided ──────────────────────────────────
      - name: Prepare cookies
        id: cookies
        run: |
          COOKIE_ARG=""
          COOKIES="${{ github.event.inputs.youtube_cookies }}"
          if [ -n "$COOKIES" ]; then
            echo "$COOKIES" > /tmp/yt_cookies.txt
            COOKIE_ARG="--cookies /tmp/yt_cookies.txt"
            echo "✅  Cookies loaded"
          else
            echo "ℹ️  No cookies provided — will try without"
          fi
          echo "cookie_arg=$COOKIE_ARG" >> $GITHUB_OUTPUT

      # ── Validate inputs ─────────────────────────────────────────────────
      - name: Validate inputs
        id: validate
        run: |
          python3 << 'PYEOF'
          import os, sys, re

          url    = os.environ.get('INPUT_URL', '').strip().strip('*_ \t')
          fmt    = os.environ.get('INPUT_FORMAT', 'mp4').strip()
          qual   = os.environ.get('INPUT_QUALITY', '').strip()
          folder = os.environ.get('INPUT_FOLDER', 'downloads').strip()

          if not re.match(r'https?://(www\.)?(youtube\.com|youtu\.be)/\S+', url, re.I):
              print(f"::error::Invalid YouTube URL: '{url}'")
              sys.exit(1)

          valid_video = ('144p','360p','480p','720p','1080p','1440p','2160p')
          valid_audio = ('64kbps','128kbps','192kbps','320kbps')
          if fmt == 'mp3':
              qual = qual if qual in valid_audio else '192kbps'
          else:
              qual = qual if qual in valid_video else '720p'

          folder = re.sub(r'[^a-zA-Z0-9_\-/]', '_', folder).strip('/') or 'downloads'

          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f"url={url}\nfmt={fmt}\nquality={qual}\nfolder={folder}\n")

          print(f"✅  URL={url}  FMT={fmt}  QUAL={qual}  FOLDER={folder}")
          PYEOF
        env:
          INPUT_URL:     ${{ github.event.inputs.video_url }}
          INPUT_FORMAT:  ${{ github.event.inputs.output_format == 'mp3 (audio only)' && 'mp3' || 'mp4' }}
          INPUT_QUALITY: ${{ github.event.inputs.desired_quality }}
          INPUT_FOLDER:  ${{ github.event.inputs.output_folder }}

      # ── Download ─────────────────────────────────────────────────────────
      - name: Download with yt-dlp
        id: download
        run: |
          python3 << 'PYEOF'
          import os, sys, subprocess, shutil

          url     = "${{ steps.validate.outputs.url }}"
          fmt     = "${{ steps.validate.outputs.fmt }}"
          quality = "${{ steps.validate.outputs.quality }}"
          folder  = "${{ steps.validate.outputs.folder }}"
          cookies = "${{ steps.cookies.outputs.cookie_arg }}"  # e.g. "--cookies /tmp/yt_cookies.txt"
          tmp_dir = os.path.join(folder, ".tmp_dl")
          os.makedirs(tmp_dir, exist_ok=True)

          out_tmpl = os.path.join(tmp_dir, "%(title).80s [%(id)s].%(ext)s")

          # Cookie flags (split into list if present)
          cookie_flags = cookies.split() if cookies.strip() else []

          # ── Clients to try in order (each bypasses bot-check differently) ──
          # tv_embedded  → no sign-in required, no bot check
          # mweb         → mobile web client, less restricted
          # web          → standard (needs cookies on shared IPs)
          CLIENTS = ["tv_embedded", "mweb", "ios", "android"]

          def build_cmd(client, fmt_sel, extra_flags=None):
              cmd = [
                  "yt-dlp",
                  "--no-playlist",
                  "--extractor-args", f"youtube:player_client={client}",
                  "--restrict-filenames",
                  "--no-warnings",
                  "--progress",
                  "-o", out_tmpl,
              ] + cookie_flags + (extra_flags or [])

              if fmt == "mp3":
                  bitrate = quality.replace("kbps", "")
                  cmd += ["-x", "--audio-format", "mp3", "--audio-quality", bitrate]
              else:
                  cmd += ["-f", fmt_sel, "--merge-output-format", "mp4"]

              cmd.append(url)
              return cmd

          height = quality.rstrip("p")
          fmt_sel = "/".join([
              f"bestvideo[height<={height}][ext=mp4]+bestaudio[ext=m4a]",
              f"bestvideo[height<={height}]+bestaudio",
              f"best[height<={height}]",
              "bestvideo+bestaudio",
              "best",
          ])

          success = False
          for client in CLIENTS:
              print(f"\n▶  Trying client: [{client}]")
              result = subprocess.run(build_cmd(client, fmt_sel))
              if result.returncode == 0:
                  # Check a file actually appeared
                  files = [f for f in os.listdir(tmp_dir) if os.path.isfile(os.path.join(tmp_dir, f))]
                  if files:
                      success = True
                      print(f"✅  Success with client [{client}]")
                      break
              print(f"⚠️   Client [{client}] failed — trying next …")

          if not success:
              print("\n::error::All clients failed.")
              print("::error::Possible reasons:")
              print("::error::  1. Video is age-restricted or private → provide cookies")
              print("::error::  2. Video is unavailable in GitHub's region")
              print("::error::  3. YouTube changed their API — update yt-dlp")
              sys.exit(1)

          files = [f for f in os.listdir(tmp_dir) if os.path.isfile(os.path.join(tmp_dir, f))]
          downloaded = files[0]
          size_mb = os.path.getsize(os.path.join(tmp_dir, downloaded)) / (1024 * 1024)

          print(f"\n✅  File : {downloaded}")
          print(f"✅  Size : {size_mb:.1f} MB")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f"filename={downloaded}\ntmp_dir={tmp_dir}\nsize_mb={size_mb:.1f}\n")
          PYEOF

      # ── Split or move ────────────────────────────────────────────────────
      - name: Split or move file
        run: |
          python3 << 'PYEOF'
          import os, subprocess, shutil

          folder   = "${{ steps.validate.outputs.folder }}"
          tmp_dir  = "${{ steps.download.outputs.tmp_dir }}"
          filename = "${{ steps.download.outputs.filename }}"
          size_mb  = float("${{ steps.download.outputs.size_mb }}")

          try:
              thresh = int(float("${{ github.event.inputs.max_part_mb }}".strip()))
          except (ValueError, TypeError):
              thresh = 0
          if thresh <= 0 or thresh > 95:
              thresh = 95

          src = os.path.join(tmp_dir, filename)

          if size_mb > thresh:
              print(f"📦  {size_mb:.1f} MB > {thresh} MB → splitting")
              zip_base = os.path.join(folder, filename + ".zip")
              subprocess.run(["zip", "-r", "-s", f"{thresh}m", zip_base, "--", src], check=True)
              parts = sorted([
                  f for f in os.listdir(folder)
                  if f.startswith(filename + ".z") or f == filename + ".zip"
              ])
              print(f"✅  {len(parts)} part(s) created")
              with open(os.path.join(folder, f"HOW_TO_JOIN_{filename}.txt"), "w") as fh:
                  fh.write(
                      f"Download ALL parts:\n" + "\n".join(f"  {p}" for p in parts) +
                      "\n\nLinux/macOS:\n  zip -FF " + filename + ".zip --out full.zip && unzip full.zip" +
                      "\n\nWindows:\n  Open .zip with 7-Zip\n"
                  )
          else:
              print(f"📁  {size_mb:.1f} MB ≤ {thresh} MB → moving directly")
              shutil.move(src, os.path.join(folder, filename))

          shutil.rmtree(tmp_dir, ignore_errors=True)
          PYEOF

      # ── Commit & push ────────────────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.validate.outputs.folder }}/"
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "⬇️ YT ${{ steps.validate.outputs.fmt }} – ${{ steps.download.outputs.filename }} (${{ steps.download.outputs.size_mb }} MB, ${{ steps.validate.outputs.quality }}) [skip ci]"
            git push
            echo "✅  Pushed to ${{ steps.validate.outputs.folder }}/"
          fi
